<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheeseThief</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --gold: #f5c518;
    --text: #eaeaea;
    --muted: #8892a4;
    --table-bg: #2d4a22;
    --table-edge: #4a7a3a;
    --table-felt: #3a6030;
    --radius: 12px;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 18px 32px;
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 {
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--gold);
  }

  header .cheese-icon { font-size: 1.8rem; }

  main {
    width: 100%;
    max-width: 1100px;
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* ── Lobby ── */
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    width: 100%;
    max-width: 440px;
  }

  .card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 28px;
    width: 100%;
  }

  .card h2 { margin-bottom: 18px; font-size: 1.1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .field label { font-size: 0.85rem; color: var(--muted); }
  .field input {
    background: var(--bg);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }
  .field input:focus { border-color: var(--accent); }
  .field input.code-input { text-transform: uppercase; letter-spacing: 4px; font-size: 1.2rem; font-weight: 700; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 22px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    width: 100%;
  }
  .btn:hover { opacity: .88; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--card); color: var(--text); }
  .btn-danger { background: #7a1f2e; color: #f5a5b0; }
  .btn-gold { background: var(--gold); color: #1a1a2e; }
  .btn-subtle { background: transparent; color: var(--muted); border: 1px solid rgba(255,255,255,.18); }
  .btn-subtle:hover { background: rgba(255,255,255,.06); color: var(--text); opacity: 1; }
  .btn-sm { width: auto; padding: 6px 13px; font-size: 0.82rem; }

  .divider { color: var(--muted); text-align: center; font-size: 0.85rem; margin: 4px 0; }

  .error-msg { color: var(--accent); font-size: 0.85rem; min-height: 1.2em; text-align: center; }

  /* ── Room view ── */
  #room { display: none; width: 100%; flex-direction: column; align-items: center; gap: 24px; }

  .room-header {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    width: 100%;
  }

  .room-code-box {
    background: var(--surface);
    border: 2px solid var(--gold);
    border-radius: var(--radius);
    padding: 14px 28px;
    text-align: center;
  }
  .room-code-box .label { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .room-code-box .code {
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: 8px;
    color: var(--gold);
    line-height: 1.1;
  }

  .room-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  /* ── Table ── */
  .table-wrap {
    position: relative;
    width: min(520px, 90vw);
    aspect-ratio: 1;
    margin-top: 48px;
  }

  .table-circle {
    position: absolute;
    inset: 10%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--table-felt), var(--table-bg));
    border: 10px solid var(--table-edge);
    box-shadow:
      0 0 0 3px #2a4a20,
      0 12px 40px rgba(0,0,0,.6),
      inset 0 2px 8px rgba(255,255,255,.07);
  }

  /* Cheese token shown on the table while waiting to start */
  .table-cheese {
    position: absolute;
    inset: 10%;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: opacity .5s ease, transform .5s ease;
  }
  .table-cheese {
    font-size: clamp(38px, 9vw, 78px);
    line-height: 1;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,.55));
  }
  .table-cheese.hidden { opacity: 0; transform: scale(.4); }

  /* Seat slots positioned around the table */
  .seat {
    position: absolute;
    width: 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transform: translate(-50%, -50%);
    transition: all .45s cubic-bezier(.4,0,.2,1);
  }

  .silhouette {
    width: 52px;
    height: 52px;
    position: relative;
  }

  .silhouette svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
  }

  .seat-name {
    font-size: 0.92rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,.85);
    white-space: nowrap;
    max-width: 96px;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
    letter-spacing: .2px;
  }

  .seat-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    font-size: 14px;
    line-height: 1;
  }

  /* Member list sidebar */
  .members-panel {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    max-width: 340px;
  }
  .members-panel h3 { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }

  .member-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--bg);
    margin-bottom: 8px;
  }
  .member-row:last-child { margin-bottom: 0; }
  .member-avatar { font-size: 1.3rem; }
  .member-name { flex: 1; font-size: 0.95rem; }
  .member-tag { font-size: 0.72rem; color: var(--gold); }

  .layout-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 24px;
    align-items: start;
    width: 100%;
  }
  .layout-row .table-wrap { grid-column: 2; }
  .layout-row .members-panel { grid-column: 3; justify-self: end; }
  @media (max-width: 860px) {
    .layout-row { grid-template-columns: 1fr; justify-items: center; }
    .layout-row .table-wrap, .layout-row .members-panel { grid-column: 1; justify-self: center; }
  }

  /* Empty seat placeholder */
  .empty-seat-hint {
    position: absolute;
    inset: 10%;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    border-radius: 50%;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translate(-50%,-50%) scale(.8); } to { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
  .seat { animation: fadeIn .35s ease; }

  .game-status { margin-top: 14px; font-size: 0.85rem; color: var(--muted); }

  .host-options {
    width: 100%;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 0.9rem;
  }
  .settings-title {
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .settings-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 24px;
    align-items: center;
  }
  .settings-controls .randomise-slot { margin-left: auto; }
  .host-options .opt { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .host-options .opt-hint { color: var(--muted); font-size: 0.82rem; }
  .host-options input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); }
  .host-options select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 6px;
    padding: 4px 8px;
  }

  .seat.spectating { opacity: .4; filter: grayscale(.6); }

  /* ── Scoreboard ── */
  .scoreboard-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 22px;
    border-top: 1px solid rgba(255,255,255,.08);
    padding-top: 16px;
  }
  .scoreboard-head h3 { margin: 0; }
  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 8px;
    background: var(--bg);
    margin-bottom: 6px;
    font-size: 0.92rem;
  }
  .score-row.leader { background: rgba(245,197,24,.14); border: 1px solid rgba(245,197,24,.4); }
  .score-rank { width: 18px; text-align: center; color: var(--muted); font-size: 0.82rem; }
  .score-dot { font-size: 1rem; }
  .score-name { flex: 1; font-weight: 600; }
  .score-pts { font-weight: 800; color: var(--gold); font-variant-numeric: tabular-nums; }
  .score-empty { color: var(--muted); font-size: 0.85rem; }

  /* ── Game overlay ── */
  #gameOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 12, 24, 0.82);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #gameOverlay.show { display: flex; }

  .overlay-card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
    animation: cardPop .3s ease;
  }
  @keyframes cardPop { from { opacity: 0; transform: scale(.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

  .overlay-card h2 { font-size: 1.5rem; margin-bottom: 8px; }
  .overlay-card p { color: var(--text); margin-bottom: 12px; line-height: 1.5; }
  .overlay-card .sub { color: var(--muted); font-size: 0.9rem; }

  .role-badge {
    font-size: 4rem;
    margin: 12px 0;
    display: block;
  }
  .role-title { font-size: 1.8rem; font-weight: 800; letter-spacing: 1px; margin-bottom: 6px; }
  .role-thief { color: var(--accent); }
  .role-sleepy { color: #5b8dd9; }

  .info-line {
    background: var(--bg);
    border-radius: 10px;
    padding: 12px 16px;
    margin: 10px 0;
    text-align: left;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .info-line .emoji { font-size: 1.4rem; }

  .hour-badge {
    display: inline-block;
    background: var(--card);
    color: var(--gold);
    font-size: 2.2rem;
    font-weight: 800;
    width: 64px;
    height: 64px;
    line-height: 64px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    margin: 8px 0;
  }

  .night-clock {
    font-size: 3.4rem;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: 3px;
    font-variant-numeric: tabular-nums;
    margin: 14px 0 6px;
    text-shadow: 0 2px 14px rgba(245,197,24,.25);
    transition: transform .25s;
  }
  .night-narration {
    color: var(--muted);
    font-size: 0.95rem;
    min-height: 1.3em;
    margin-bottom: 8px;
    transition: color .2s;
  }
  .night-narration.mine { color: var(--gold); font-weight: 700; }

  .choice-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin: 14px 0;
  }
  .choice-btn {
    background: var(--card);
    color: var(--text);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    transition: background .15s, transform .1s;
  }
  .choice-btn:hover { background: var(--accent); }
  .choice-btn:active { transform: scale(.96); }
  .choice-btn.selected { background: var(--accent); color: #fff; }
  .choice-btn:disabled { opacity: .5; cursor: default; }

  .overlay-actions { margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }

  .timer-big {
    font-size: 3rem;
    font-weight: 800;
    color: var(--gold);
    margin: 10px 0;
    font-variant-numeric: tabular-nums;
  }

  .result-banner {
    font-size: 1.6rem;
    font-weight: 800;
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 16px;
  }
  .result-win { background: rgba(91,217,160,.18); color: #5bd9a0; }
  .result-lose { background: rgba(233,69,96,.18); color: var(--accent); }

  .reveal-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 14px;
    margin: 6px 0;
    font-size: 0.95rem;
  }
  .reveal-tag { font-size: 0.8rem; color: var(--gold); font-weight: 700; }
  .waiting-note { color: var(--muted); font-size: 0.9rem; margin-top: 14px; }

  /* ── Voting dialog ── */
  .overlay-card.wide { max-width: 820px; }
  .vote-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
    margin: 18px 0;
  }
  .vote-card {
    background: var(--bg);
    color: var(--text);
    border: 2px solid rgba(255,255,255,.1);
    border-radius: 12px;
    padding: 14px 10px 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: border-color .15s, transform .1s, background .15s;
    text-align: center;
  }
  .vote-card:hover { border-color: var(--accent); background: var(--surface); }
  .vote-card:active { transform: scale(.97); }
  .vote-card.selected { border-color: var(--accent); background: rgba(233,69,96,.16); }
  .vote-avatar { width: 64px; height: 64px; }
  .vote-avatar svg { width: 100%; height: 100%; filter: drop-shadow(0 2px 6px rgba(0,0,0,.5)); }
  .vote-cardname { font-weight: 800; font-size: 1rem; }
  .vote-info { display: flex; flex-direction: column; gap: 3px; margin-top: 2px; }
  .vote-tag {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--gold);
    background: rgba(245,197,24,.12);
    border-radius: 6px;
    padding: 2px 6px;
  }
  .vote-tag.muted { color: var(--muted); background: rgba(255,255,255,.06); }
</style>
</head>
<body>

<header>
  <span class="cheese-icon">🧀</span>
  <h1>CHEESE THIEF</h1>
</header>

<main>
  <!-- LOBBY -->
  <div id="lobby">
    <div class="card">
      <h2>Who are you?</h2>
      <div class="field">
        <label for="nameInput">Your name</label>
        <input id="nameInput" type="text" maxlength="20" placeholder="Enter your name…" autocomplete="off">
      </div>
    </div>

    <div class="card">
      <h2>Create a room</h2>
      <button class="btn btn-primary" id="createBtn">🚪 Create Room</button>
    </div>

    <div class="divider">— or —</div>

    <div class="card">
      <h2>Join a room</h2>
      <div class="field">
        <label for="codeInput">Room code</label>
        <input id="codeInput" class="code-input" type="text" maxlength="4" placeholder="XXXX" autocomplete="off">
      </div>
      <button class="btn btn-secondary" id="joinBtn">🔑 Join Room</button>
    </div>

    <div class="error-msg" id="lobbyError"></div>
  </div>

  <!-- ROOM -->
  <div id="room">
    <div class="room-header">
      <div class="room-code-box">
        <div class="label">Room Code</div>
        <div class="code" id="displayCode">----</div>
      </div>
      <div class="room-actions">
        <button class="btn btn-primary btn-sm" id="startGameBtn" style="display:none">🧀 Start Game</button>
        <button class="btn btn-danger btn-sm" id="leaveBtn">🚪 Leave Room</button>
      </div>
    </div>

    <div id="hostOptions" class="host-options" style="display:none">
      <div class="settings-title">⚙️ Game Settings</div>
      <div class="settings-controls">
        <label class="opt" id="fallMouseOpt"><input type="checkbox" id="optFallMouse"> 🐭 <b>Fall Mouse</b> <span class="opt-hint">— wins by getting the most votes (6-8 players)</span></label>
        <label class="opt">⏱️ Discussion
          <select id="optTimer">
            <option value="90" selected>1.5 min</option>
            <option value="120">2 min</option>
            <option value="180">3 min</option>
            <option value="240">4 min</option>
            <option value="300">5 min</option>
          </select>
        </label>
        <span class="randomise-slot"><button class="btn btn-subtle btn-sm" id="randomiseBtn">🎲 Randomise Seats</button></span>
      </div>
    </div>

    <div class="layout-row">
      <div class="table-wrap" id="tableWrap">
        <div class="table-circle"></div>
        <div class="table-cheese" id="tableCheese"></div>
        <!-- seats injected here -->
      </div>

      <div class="members-panel">
        <h3>Players</h3>
        <div id="memberList"></div>
        <div id="gameStatus" class="game-status"></div>

        <div class="scoreboard-head">
          <h3>🏆 Session Scores</h3>
          <button class="btn btn-danger btn-sm" id="resetScoresBtn" style="display:none">Reset</button>
        </div>
        <div id="scoreboard"></div>
      </div>
    </div>
  </div>
</main>

<!-- GAME OVERLAY -->
<div id="gameOverlay">
  <div class="overlay-card" id="overlayCard"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let myId = socket.id;
let myName = '';
let isAdmin = false;
let currentCode = null;

socket.on('connect', () => { myId = socket.id; });

// ── Lobby ──
const nameInput = document.getElementById('nameInput');
const codeInput = document.getElementById('codeInput');
const lobbyError = document.getElementById('lobbyError');

codeInput.addEventListener('input', () => {
  codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z]/g, '');
});

document.getElementById('createBtn').addEventListener('click', () => {
  const name = nameInput.value.trim();
  if (!name) { lobbyError.textContent = 'Please enter your name.'; return; }
  myName = name;
  lobbyError.textContent = '';
  socket.emit('create_room', { name });
});

document.getElementById('joinBtn').addEventListener('click', () => {
  const name = nameInput.value.trim();
  const code = codeInput.value.trim().toUpperCase();
  if (!name) { lobbyError.textContent = 'Please enter your name.'; return; }
  if (code.length !== 4) { lobbyError.textContent = 'Please enter a 4-letter room code.'; return; }
  myName = name;
  lobbyError.textContent = '';
  socket.emit('join_room', { name, code });
});

document.getElementById('leaveBtn').addEventListener('click', () => {
  socket.emit('leave_room');
  showLobby();
});

document.getElementById('randomiseBtn').addEventListener('click', () => {
  socket.emit('randomise_seats');
});

socket.on('joined_room', ({ code, isAdmin: admin }) => {
  isAdmin = admin;
  currentCode = code;
  document.getElementById('displayCode').textContent = code;
  document.getElementById('randomiseBtn').style.display = admin ? 'inline-flex' : 'none';
  showRoom();
});

socket.on('kicked', () => {
  alert('You have been removed from the room by the admin.');
  showLobby();
});

socket.on('error', (msg) => {
  lobbyError.textContent = msg;
});

let roomMembers = [];
let roomAdmin = null;
let roomGamePhase = 'lobby';
let participantIds = null;
let roomScores = {};
let minPlayers = 4, maxPlayers = 8;

socket.on('room_update', ({ admin, members, gamePhase, participantIds: pid, scores, minPlayers: mn, maxPlayers: mx }) => {
  isAdmin = admin === myId;
  roomMembers = members;
  roomAdmin = admin;
  roomGamePhase = gamePhase || 'lobby';
  participantIds = pid || null;
  if (scores) roomScores = scores;
  if (mn) minPlayers = mn;
  if (mx) maxPlayers = mx;
  updateRoomControls();
  renderTable(members, admin);
  renderMemberList(members, admin);
  renderScoreboard();
});

function renderScoreboard() {
  const board = document.getElementById('scoreboard');
  const ranked = [...roomMembers]
    .map(m => ({ name: m.name, id: m.id, seat: m.seat, pts: roomScores[m.id] || 0 }))
    .sort((a, b) => b.pts - a.pts || a.seat - b.seat);
  const maxPts = ranked.length ? ranked[0].pts : 0;
  board.innerHTML = ranked.map((p, i) => {
    const isLeader = maxPts > 0 && p.pts === maxPts;
    const color = COLORS[p.seat % COLORS.length];
    return `<div class="score-row ${isLeader ? 'leader' : ''}">
      <span class="score-rank">${isLeader ? '👑' : (i + 1)}</span>
      <span class="score-dot" style="color:${color}">●</span>
      <span class="score-name">${esc(p.name)}${p.id === myId ? ' (you)' : ''}</span>
      <span class="score-pts">${p.pts}</span>
    </div>`;
  }).join('') || '<div class="score-empty">No scores yet.</div>';

  document.getElementById('resetScoresBtn').style.display =
    (isAdmin && roomGamePhase === 'lobby') ? 'inline-flex' : 'none';
}

function isSpectator(id) {
  return participantIds && !participantIds.includes(id);
}

function updateRoomControls() {
  const inLobby = roomGamePhase === 'lobby';
  const n = roomMembers.length;
  const canStart = isAdmin && inLobby && n >= minPlayers && n <= maxPlayers;
  const startBtn = document.getElementById('startGameBtn');
  startBtn.style.display = (isAdmin && inLobby) ? 'inline-flex' : 'none';
  startBtn.disabled = !canStart;
  startBtn.title = canStart ? '' : `Need ${minPlayers}-${maxPlayers} players`;
  document.getElementById('randomiseBtn').style.display = (isAdmin && inLobby) ? 'inline-flex' : 'none';
  document.getElementById('hostOptions').style.display = (isAdmin && inLobby) ? 'block' : 'none';
  const cheese = document.getElementById('tableCheese');
  if (cheese) cheese.classList.toggle('hidden', !inLobby);
  const fmBox = document.getElementById('optFallMouse');
  const fmAllowed = n >= 6;
  fmBox.disabled = !fmAllowed;
  if (!fmAllowed) fmBox.checked = false;
  document.getElementById('fallMouseOpt').title = fmAllowed ? '' : 'Requires 6-8 players';
  document.getElementById('fallMouseOpt').style.opacity = fmAllowed ? '1' : '.5';

  const status = document.getElementById('gameStatus');
  if (inLobby) {
    status.textContent = n < minPlayers
      ? `Need at least ${minPlayers} players to start (${n}/${minPlayers}).`
      : `Ready to play — ${n} players.`;
  } else {
    const specs = roomMembers.filter(m => isSpectator(m.id)).length;
    status.textContent = specs ? `${specs} spectator${specs > 1 ? 's' : ''} waiting for next round.` : '';
  }
}

// ── Mouse silhouettes (4 styles, coloured by seat) ──
function mouseSVG(color, style) {
  style = ((style % 4) + 4) % 4;
  // Per-style ear size/position, plus an optional accessory, for visual variety.
  const ear = [
    { r: 8.5, y: 14, x: 8 },   // 0: classic round ears
    { r: 10.5, y: 12, x: 9 },  // 1: big ears
    { r: 7, y: 15, x: 7 },     // 2: small ears
    { r: 9, y: 13, x: 8.5 },   // 3: medium ears + hair tuft
  ][style];
  const tail = style === 2
    ? `<path d="M39 42 q11 1 8 -10" stroke="${color}" stroke-width="2.6" fill="none" stroke-linecap="round"/>`
    : '';
  const tuft = style === 3
    ? `<path d="M26 5 q2.5 -4 5 1" stroke="${color}" stroke-width="2.6" fill="none" stroke-linecap="round"/>`
    : '';
  const dark = 'rgba(0,0,0,.28)';
  return `<svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
    ${tail}
    <circle cx="${26 - ear.x}" cy="${ear.y}" r="${ear.r}" fill="${color}"/>
    <circle cx="${26 + ear.x}" cy="${ear.y}" r="${ear.r}" fill="${color}"/>
    <circle cx="${26 - ear.x}" cy="${ear.y}" r="${ear.r * 0.46}" fill="${dark}"/>
    <circle cx="${26 + ear.x}" cy="${ear.y}" r="${ear.r * 0.46}" fill="${dark}"/>
    ${tuft}
    <ellipse cx="26" cy="31" rx="15" ry="16" fill="${color}"/>
    <circle cx="20.5" cy="29" r="1.9" fill="${dark}"/>
    <circle cx="31.5" cy="29" r="1.9" fill="${dark}"/>
    <circle cx="26" cy="42.5" r="2.4" fill="${dark}"/>
  </svg>`;
}

const COLORS = ['#5b8dd9','#d96b5b','#5bd9a0','#d9c45b','#a05bd9','#5bd9d9','#d95ba0','#8dd95b'];

// ── Cheese token (shown on the table while waiting to start) ──

// ── Table rendering ──
function renderTable(members, adminId) {
  const wrap = document.getElementById('tableWrap');
  // Remove old seats
  wrap.querySelectorAll('.seat').forEach(el => el.remove());

  const n = members.length;
  if (n === 0) return;

  const wrapSize = wrap.offsetWidth || 520;
  const cx = wrapSize / 2;
  const cy = wrapSize / 2;
  // radius for seat centres — slightly outside the table edge
  const tableR = wrapSize * 0.4;
  const seatR = tableR + wrapSize * 0.105;

  // Sort by seat index
  const sorted = [...members].sort((a, b) => a.seat - b.seat);

  sorted.forEach((m, i) => {
    const angle = (2 * Math.PI * i) / n - Math.PI / 2;
    const x = cx + seatR * Math.cos(angle);
    const y = cy + seatR * Math.sin(angle);

    const color = COLORS[m.seat % COLORS.length];
    const isMe = m.id === myId;
    const isAdminMember = m.id === adminId;

    const seat = document.createElement('div');
    seat.className = 'seat' + (isSpectator(m.id) ? ' spectating' : '');
    seat.style.left = x + 'px';
    seat.style.top = y + 'px';
    seat.dataset.id = m.id;

    seat.innerHTML = `
      <div class="silhouette">
        ${mouseSVG(color, m.seat)}
        ${isAdminMember ? '<span class="seat-badge">⭐</span>' : ''}
      </div>
      <div class="seat-name">${esc(m.name)}${isMe ? ' (you)' : ''}</div>
    `;

    wrap.appendChild(seat);
  });
}

// ── Member list ──
function renderMemberList(members, adminId) {
  const list = document.getElementById('memberList');
  list.innerHTML = '';

  const sorted = [...members].sort((a, b) => a.seat - b.seat);

    const isAdminMember = m.id === adminId;
    const isMe = m.id === myId;
    const color = COLORS[i % COLORS.length];

    row.innerHTML = `
      <span class="member-avatar" style="color:${color}">●</span>
      <span class="member-name">
        ${isAdminMember ? '⭐ ' : ''}${esc(m.name)}${isMe ? ' <span class="member-tag">(you)</span>' : ''}
      </span>
      ${isSpectator(m.id) ? '<span class="member-tag">👀 spectating</span>' : ''}
      ${isAdmin && !isMe && !isAdminMember
        ? `<button class="btn btn-danger btn-sm kick-btn" data-id="${m.id}">Kick</button>`
        : isAdminMember ? '<span class="member-tag">Admin</span>' : ''}

  list.querySelectorAll('.kick-btn').forEach(btn => {

}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════ GAME ══════════════
let mySecret = null;
let gameState = null;
let timerInterval = null;
let myVoteTarget = null;

// Night reveal sequence (the clock ticking 01:00 → 06:00).
let nightInit = false;
let nightState = null;     // { clockHour, finished }
let nightTimers = [];
const NIGHT_HOUR_MS = 3500;

function resetNight() {
  nightTimers.forEach(t => clearTimeout(t));
  nightTimers = [];
  nightInit = false;
  nightState = null;
}

const overlay = document.getElementById('gameOverlay');
const overlayCard = document.getElementById('overlayCard');

function nameOf(id) {
  const m = roomMembers.find(x => x.id === id);
  return m ? esc(m.name) : '???';
}

document.getElementById('startGameBtn').addEventListener('click', () => {
  socket.emit('start_game', {
    fallMouse: document.getElementById('optFallMouse').checked,
    discussionSeconds: parseInt(document.getElementById('optTimer').value, 10),
  });
});

socket.on('your_secret', (s) => { mySecret = s; renderGame(); });

socket.on('game_update', (g) => {
  gameState = g;
  if (g.phase === 'lobby' || g.phase === 'roleReveal') myVoteTarget = null;
  if (g.phase !== 'night') resetNight(); // tear down the clock when night ends
  if (g.phase === 'lobby') {
    mySecret = null;
    overlay.classList.remove('show');
    return;
  }
  renderGame();
});

socket.on('game_aborted', ({ reason }) => {
  mySecret = null;
  gameState = null;
  resetNight();
  overlay.classList.remove('show');
  if (reason) alert(reason);
});

function hostBtn(label, event) {
  return isAdmin
    ? `<button class="btn btn-primary" data-host="${event}">${label}</button>`
    : `<p class="waiting-note">Waiting for the host…</p>`;
}

function renderGame() {
  if (!gameState || gameState.phase === 'lobby') { overlay.classList.remove('show'); return; }
  overlay.classList.add('show');
  const phase = gameState.phase;

  // Spectators (joined mid-round) only watch until results.
  if (mySecret && mySecret.spectator && phase !== 'results') {
    overlayCard.innerHTML = `
      <span class="role-badge">👀</span>
      <h2>Spectating</h2>
      <p class="sub">A round is already underway. You'll join in automatically next round.</p>
      <p class="waiting-note">Current phase: ${phase}</p>`;
    return;
  }

  overlayCard.classList.toggle('wide', phase === 'voting');

  if (phase === 'roleReveal') renderRoleReveal();
  else if (phase === 'night') renderNight();
  else if (phase === 'discussion') renderDiscussion();
  else if (phase === 'voting') renderVoting();
  else if (phase === 'results') renderResults();

  // Wire host buttons
  overlayCard.querySelectorAll('[data-host]').forEach(b => {
    b.addEventListener('click', () => socket.emit(b.dataset.host));
  });
  // Wire choice buttons
  overlayCard.querySelectorAll('[data-action]').forEach(b => {
    b.addEventListener('click', () => {
      socket.emit(b.dataset.action, { targetId: b.dataset.target });
    });
  });
}

function renderRoleReveal() {
  if (!mySecret) { overlayCard.innerHTML = '<p>Dealing cards…</p>'; return; }
  const acked = (gameState.ackedCount || 0);
  const total = gameState.total || roomMembers.length;
  const role = mySecret.role;
  const meta = {
    thief: { emoji: '🧀', cls: 'role-thief', title: 'CHEESE THIEF', sub: 'Steal the cheese in the night and avoid the vote.' },
    fallMouse: { emoji: '🐭', cls: 'role-thief', title: 'FALL MOUSE', sub: 'Act suspicious! You win if you get the MOST votes.' },
    sleepyhead: { emoji: '😴', cls: 'role-sleepy', title: 'SLEEPYHEAD', sub: 'Work out who stole the breakfast cheese.' },
  }[role] || { emoji: '😴', cls: 'role-sleepy', title: 'SLEEPYHEAD', sub: '' };
  overlayCard.innerHTML = `
    <span class="role-badge">${meta.emoji}</span>
    <div class="role-title ${meta.cls}">${meta.title}</div>
    <p class="sub">${meta.sub}</p>
    <div class="overlay-actions">
      <button class="btn btn-secondary" id="ackBtn">Got it 👍</button>
      <p class="waiting-note">${acked}/${total} players ready</p>
      ${isAdmin ? hostBtn('Begin Night →', 'begin_night') : ''}
    </div>
  `;
  const ackBtn = document.getElementById('ackBtn');
  if (ackBtn) ackBtn.addEventListener('click', () => {
    socket.emit('ack_role');
    ackBtn.disabled = true;
    ackBtn.textContent = 'Ready ✓';
  });
}

function cheeseText(c) {
  if (c === 'thief') return { e: '🧀', t: 'You crept down and took the cheese.' };
  if (c === true) return { e: '🧀', t: 'The cheese was still there when you woke.' };
  if (c === 'taken') return { e: '👀', t: 'You woke just as the cheese was being taken!' };
  return { e: '❌', t: 'The cheese was already gone when you woke.' };
}

// The night plays out as a clock ticking 01:00 → 06:00. A player's own information
// is only revealed when their wake-up hour is called, with a pause between each hour.
function renderNight() {
  if (!mySecret) { overlayCard.innerHTML = '<p>The house falls asleep…</p>'; return; }

  // Already running — just refresh the parts that can change (peek/recruit/host button).
  if (nightInit) {
    if (nightState && nightState.clockHour >= mySecret.hour) revealNightPersonalInfo();
    refreshNightActions();
    return;
  }

  nightInit = true;
  overlayCard.innerHTML = `
    <h2>🌙 Night falls…</h2>
    <div class="night-clock" id="nightClock">00:00</div>
    <div class="night-narration" id="nightNarration">The whole house is fast asleep.</div>
    <div id="nightInfo"></div>
    <div id="nightActions"></div>
  `;
  startNightSequence();
}

function startNightSequence() {
  nightState = { clockHour: 0, finished: false };
  let h = 1;
  const step = () => {
    nightState.clockHour = h;
    const clk = document.getElementById('nightClock');
    const nar = document.getElementById('nightNarration');
    if (clk) clk.textContent = String(h).padStart(2, '0') + ':00';
    if (nar) {
      nar.textContent = (mySecret && h === mySecret.hour)
        ? '⏰ This is your hour — you wake!'
        : `${h} o'clock… the house stirs.`;
      nar.classList.toggle('mine', !!(mySecret && h === mySecret.hour));
    }
    if (mySecret && h === mySecret.hour) revealNightPersonalInfo();
    refreshNightActions();

    if (h < 6) {
      nightTimers.push(setTimeout(() => { h += 1; step(); }, NIGHT_HOUR_MS));
    } else {
      nightTimers.push(setTimeout(() => {
        nightState.finished = true;
        const nar2 = document.getElementById('nightNarration');
        if (nar2) { nar2.textContent = '☀️ Dawn breaks…'; nar2.classList.remove('mine'); }
        refreshNightActions();
      }, NIGHT_HOUR_MS));
    }
  };
  step();
}

// Fill in the local player's private information block (called at their hour).
function revealNightPersonalInfo() {
  const box = document.getElementById('nightInfo');
  if (!box) return;
  const s = mySecret;
  const isThief = s.role === 'thief';
  const ch = cheeseText(s.cheesePresent);
  let html = `
    <div class="info-line"><span class="emoji">⏰</span><span>You woke at <b>${String(s.hour).padStart(2, '0')}:00</b>.</span></div>
    <div class="info-line"><span class="emoji">${ch.e}</span><span>${ch.t}</span></div>
  `;

  if (!isThief && s.knownThiefId) {
    html += `<div class="info-line"><span class="emoji">🔦</span><span>You know <b>${nameOf(s.knownThiefId)}</b> is the Cheese Thief.</span></div>`;
  }
  if (!isThief && s.isFollower) {
    let t = s.knownThiefId
      ? 'You are one of the thief\'s <b>followers</b> — keep the secret.'
      : 'You are one of the thief\'s <b>followers</b>, but you do <b>not</b> know who the thief is.';
    if (s.coFollowerIds && s.coFollowerIds.length) {
      t += ` Your fellow follower${s.coFollowerIds.length > 1 ? 's' : ''}: <b>${s.coFollowerIds.map(nameOf).join(', ')}</b>.`;
    }
    html += `<div class="info-line"><span class="emoji">🤝</span><span>${t}</span></div>`;
  }
  if (isThief) {
    html += s.awakeWith.length
      ? `<div class="info-line"><span class="emoji">👀</span><span>Awake and saw you: <b>${s.awakeWith.map(nameOf).join(', ')}</b>.</span></div>`
      : `<div class="info-line"><span class="emoji">😎</span><span>Nobody saw you take the cheese.</span></div>`;
  } else if (s.awakeWith && s.awakeWith.length) {
    const others = s.awakeWith.filter(id => id !== mySecret.knownThiefId);
    if (others.length) {
      html += `<div class="info-line"><span class="emoji">👋</span><span>Also awake at your hour: <b>${others.map(nameOf).join(', ')}</b>.</span></div>`;
    }
  }
  box.innerHTML = html;
}

// Interactive bits + host control, gated on how far the clock has progressed.
function refreshNightActions() {
  const box = document.getElementById('nightActions');
  if (!box || !nightState) return;
  const s = mySecret;
  const myHourReached = nightState.clockHour >= s.hour;
  let html = '';

  // Peek: available once the solo player's hour has been called.
  if (s.canPeek && myHourReached) {
    html += `<div class="info-line"><span class="emoji">🕵️</span><span>You were alone — peek at one player's wake-up hour:</span></div>
      <div class="choice-grid">
        ${roomMembers.filter(m => m.id !== myId).map(m => `<button class="choice-btn peek-btn" data-target="${m.id}">${esc(m.name)}</button>`).join('')}
      </div>`;
  } else if (s.peekResult) {
    html += `<div class="info-line"><span class="emoji">🔎</span><span>You peeked: <b>${nameOf(s.peekResult.targetId)}</b> woke at hour <b>${s.peekResult.hour}</b>.</span></div>`;
  }

  // Thief recruitment. Witness-mode resolves at the thief's hour; choose-mode after dawn.
  if (s.role === 'thief') {
    const recruitReady = s.chooseFromAll ? nightState.finished : myHourReached;
    if (s.needsFollowerChoice && recruitReady) {
      const remaining = s.followerCount - s.followersChosen.length;
      const label = s.chooseFromAll
        ? `Choose ${remaining} more follower${remaining > 1 ? 's' : ''} — any player:`
        : 'These players saw you — choose your <b>follower</b>:';
      html += `<div class="info-line"><span class="emoji">🤝</span><span>${label}</span></div>
        <div class="choice-grid">
          ${s.followerCandidates.map(id => `<button class="choice-btn follow-btn" data-target="${id}">${nameOf(id)}</button>`).join('')}
        </div>
        ${s.followersChosen.length ? `<p class="sub">Chosen so far: ${s.followersChosen.map(nameOf).join(', ')}</p>` : ''}`;
    } else if (s.followersChosen.length && myHourReached) {
      html += `<div class="info-line"><span class="emoji">🤝</span><span>Your follower${s.followersChosen.length > 1 ? 's' : ''}: <b>${s.followersChosen.map(nameOf).join(', ')}</b>.</span></div>`;
    }
  }

  // Host advances only once dawn has broken.
  if (nightState.finished) {
    html += `<div class="overlay-actions">${isAdmin
      ? '<button class="btn btn-primary" id="proceedDiscBtn">Proceed to Discussion →</button>'
      : '<p class="waiting-note">Waiting for the host to wake everyone…</p>'}</div>`;
  } else {
    html += `<p class="waiting-note">The night unfolds…</p>`;
  }

  box.innerHTML = html;

  box.querySelectorAll('.peek-btn').forEach(b =>
    b.addEventListener('click', () => socket.emit('peek_player', { targetId: b.dataset.target })));
  box.querySelectorAll('.follow-btn').forEach(b =>
    b.addEventListener('click', () => socket.emit('choose_follower', { targetId: b.dataset.target })));
  const proceed = document.getElementById('proceedDiscBtn');
  if (proceed) proceed.addEventListener('click', () => socket.emit('begin_discussion'));
}

function renderDiscussion() {
  const s = mySecret || {};
  const ch = s.cheesePresent !== undefined ? cheeseText(s.cheesePresent) : null;
  overlayCard.innerHTML = `
    <h2>☀️ Morning — Discuss!</h2>
    <p class="sub">Argue your case. Who stole the cheese?</p>
    <div class="timer-big" id="timerDisplay">--</div>
    ${s.hour ? `<div class="info-line"><span class="emoji">⏰</span><span>You woke at hour <b>${s.hour}</b>.</span></div>` : ''}
    ${ch ? `<div class="info-line"><span class="emoji">${ch.e}</span><span>${ch.t}</span></div>` : ''}
    ${s.role !== 'thief' && s.knownThiefId ? `<div class="info-line"><span class="emoji">🔦</span><span>You know the thief is <b>${nameOf(s.knownThiefId)}</b>.</span></div>` : ''}
    ${s.role === 'thief' && s.followersChosen && s.followersChosen.length ? `<div class="info-line"><span class="emoji">🤝</span><span>Your follower${s.followersChosen.length > 1 ? 's' : ''}: <b>${s.followersChosen.map(nameOf).join(', ')}</b>.</span></div>` : ''}
    ${s.role !== 'thief' && s.isFollower ? `<div class="info-line"><span class="emoji">🤝</span><span>You are a <b>follower</b>${s.coFollowerIds && s.coFollowerIds.length ? ` with <b>${s.coFollowerIds.map(nameOf).join(', ')}</b>` : ''}. Win if the thief escapes.</span></div>` : ''}
    ${s.peekResult ? `<div class="info-line"><span class="emoji">🔎</span><span><b>${nameOf(s.peekResult.targetId)}</b> woke at hour <b>${s.peekResult.hour}</b>.</span></div>` : ''}
    ${s.role === 'fallMouse' ? `<div class="info-line"><span class="emoji">🐭</span><span><b>Your goal:</b> get the most votes — look guilty!</span></div>` : ''}
    <div class="overlay-actions">${isAdmin ? hostBtn('Start Voting →', 'begin_voting') : '<p class="waiting-note">Voting begins when the timer ends.</p>'}</div>
  `;
  startTimer();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  const tick = () => {
    const el = document.getElementById('timerDisplay');
    if (!el || !gameState || !gameState.timerEndsAt) { return; }
    const remaining = Math.max(0, Math.round((gameState.timerEndsAt - Date.now()) / 1000));
    const m = String(Math.floor(remaining / 60)).padStart(1, '0');
    const sec = String(remaining % 60).padStart(2, '0');
    el.textContent = `${m}:${sec}`;
    if (remaining <= 0) clearInterval(timerInterval);
  };
  tick();
  timerInterval = setInterval(tick, 250);
}

// Anything the voter privately knows about a given candidate.
function voteInfoTags(id) {
  const s = mySecret || {};
  const tags = [];
  if (s.knownThiefId && s.knownThiefId === id) tags.push({ t: '🧀 You know: THIEF' });
  if (s.peekResult && s.peekResult.targetId === id) tags.push({ t: `🔎 Woke at hour ${s.peekResult.hour}`, muted: true });
  if (s.coFollowerIds && s.coFollowerIds.includes(id)) tags.push({ t: '🤝 Fellow follower' });
  if (s.role === 'thief') {
    if (s.awakeWith && s.awakeWith.includes(id)) tags.push({ t: '👀 Saw you', muted: true });
    if (s.followersChosen && s.followersChosen.includes(id)) tags.push({ t: '🤝 Your follower' });
  }
  return tags;
}

function renderVoting() {
  if (timerInterval) clearInterval(timerInterval);
  const myVote = gameState.votedIds && gameState.votedIds.includes(myId);
  const voted = (gameState.votedIds || []).length;
  const total = gameState.total || roomMembers.length;
  const candidates = roomMembers.filter(m => m.id !== myId && !isSpectator(m.id));

  const cards = candidates.map(m => {
    const color = COLORS[m.seat % COLORS.length];
    const tags = voteInfoTags(m.id)
      .map(tg => `<span class="vote-tag ${tg.muted ? 'muted' : ''}">${tg.t}</span>`).join('');
    const sel = m.id === myVoteTarget ? ' selected' : '';
    return `<button class="vote-card${sel}" data-vote="${m.id}">
      <div class="vote-avatar">${mouseSVG(color, m.seat)}</div>
      <div class="vote-cardname">${esc(m.name)}</div>
      <div class="vote-info">${tags}</div>
    </button>`;
  }).join('');

  overlayCard.innerHTML = `
    <h2>🗳️ Who stole the cheese?</h2>
    <p class="sub">Tap a player to cast (or change) your vote.</p>
    <div class="vote-grid">${cards}</div>
    <p class="waiting-note">${voted}/${total} votes cast${myVote ? ' — you voted ✓' : ''}</p>
    <div class="overlay-actions">${isAdmin ? hostBtn('Reveal Results →', 'end_voting') : ''}</div>
  `;
  overlayCard.querySelectorAll('.vote-card').forEach(b => {
    b.addEventListener('click', () => {
      myVoteTarget = b.dataset.vote;
      overlayCard.querySelectorAll('.vote-card').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
      socket.emit('cast_vote', { targetId: myVoteTarget });
    });
  });
}

function renderResults() {
  const r = gameState.result;
  if (!r) { overlayCard.innerHTML = '<p>Tallying votes…</p>'; return; }
  const role = mySecret && mySecret.role;
  let iWon = false;
  if (r.winners === 'fallMouse') iWon = role === 'fallMouse';
  else if (r.winners === 'sleepyheads') iWon = role === 'sleepyhead';
  // Thief win: the thief and a follower win together — but a Fall Mouse follower
  // never wins with them (she only ever wins alone, by most votes).
  else iWon = role === 'thief' || (mySecret && mySecret.isFollower && role !== 'fallMouse');

  const banner = {
    fallMouse: '🐭 The Fall Mouse fooled everyone!',
    sleepyheads: '😴 Sleepyheads win!',
    thief: '🧀 The Cheese Thief escapes!',
  }[r.winners];

  overlayCard.innerHTML = `
    <div class="result-banner ${iWon ? 'result-win' : 'result-lose'}">${banner}</div>
    <p class="sub">${iWon ? 'You were on the winning side! 🎉' : 'Better luck next round.'}</p>
    <div class="reveal-row"><span>🧀 <b>${nameOf(r.thiefId)}</b></span><span class="reveal-tag">THIEF</span></div>
    ${(r.followerIds || []).map(fid => `<div class="reveal-row"><span>🤝 <b>${nameOf(fid)}</b></span><span class="reveal-tag">FOLLOWER</span></div>`).join('')}
    ${r.fallMouseId ? `<div class="reveal-row"><span>🐭 <b>${nameOf(r.fallMouseId)}</b></span><span class="reveal-tag">FALL MOUSE</span></div>` : ''}
    <div class="info-line" style="margin-top:14px"><span class="emoji">🗳️</span><span>The group accused: <b>${(r.accused || []).map(nameOf).join(', ') || 'no one'}</b></span></div>
    <div class="overlay-actions">${isAdmin ? hostBtn('🔄 Play Again', 'play_again') : '<p class="waiting-note">Waiting for the host to start a new round…</p>'}</div>
  `;
}
</script>
</body>
</html>
