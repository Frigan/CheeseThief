<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheeseThief</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --gold: #f5c518;
    --text: #eaeaea;
    --muted: #8892a4;
    --table-bg: #2d4a22;
    --table-edge: #4a7a3a;
    --table-felt: #3a6030;
    --radius: 12px;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 18px 32px;
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 {
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--gold);
  }

  header .cheese-icon { font-size: 1.8rem; }

  main {
    width: 100%;
    max-width: 1100px;
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* ── Lobby ── */
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    width: 100%;
    max-width: 440px;
  }

  .card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 28px;
    width: 100%;
  }

  .card h2 { margin-bottom: 18px; font-size: 1.1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .field label { font-size: 0.85rem; color: var(--muted); }
  .field input {
    background: var(--bg);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }
  .field input:focus { border-color: var(--accent); }
  .field input.code-input { text-transform: uppercase; letter-spacing: 4px; font-size: 1.2rem; font-weight: 700; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 22px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    width: 100%;
  }
  .btn:hover { opacity: .88; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--card); color: var(--text); }
  .btn-danger { background: #7a1f2e; color: #f5a5b0; }
  .btn-gold { background: var(--gold); color: #1a1a2e; }
  .btn-sm { width: auto; padding: 6px 13px; font-size: 0.82rem; }

  .divider { color: var(--muted); text-align: center; font-size: 0.85rem; margin: 4px 0; }

  .error-msg { color: var(--accent); font-size: 0.85rem; min-height: 1.2em; text-align: center; }

  /* ── Room view ── */
  #room { display: none; width: 100%; flex-direction: column; align-items: center; gap: 24px; }

  .room-header {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 16px;
    width: 100%;
  }

  .room-code-box {
    background: var(--surface);
    border: 2px solid var(--gold);
    border-radius: var(--radius);
    padding: 14px 28px;
    text-align: center;
  }
  .room-code-box .label { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .room-code-box .code {
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: 8px;
    color: var(--gold);
    line-height: 1.1;
  }

  .room-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  /* ── Table ── */
  .table-wrap {
    position: relative;
    width: min(520px, 90vw);
    aspect-ratio: 1;
  }

  .table-circle {
    position: absolute;
    inset: 10%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--table-felt), var(--table-bg));
    border: 10px solid var(--table-edge);
    box-shadow:
      0 0 0 3px #2a4a20,
      0 12px 40px rgba(0,0,0,.6),
      inset 0 2px 8px rgba(255,255,255,.07);
  }

  .table-label {
    position: absolute;
    inset: 10%;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .table-label span {
    color: rgba(255,255,255,.12);
    font-size: 1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
  }

  /* Seat slots positioned around the table */
  .seat {
    position: absolute;
    width: 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transform: translate(-50%, -50%);
    transition: all .45s cubic-bezier(.4,0,.2,1);
  }

  .silhouette {
    width: 52px;
    height: 52px;
    position: relative;
  }

  .silhouette svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
  }

  .seat-name {
    font-size: 0.72rem;
    font-weight: 600;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,.8);
    white-space: nowrap;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
  }

  .seat-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    font-size: 14px;
    line-height: 1;
  }

  /* Member list sidebar */
  .members-panel {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    max-width: 340px;
  }
  .members-panel h3 { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }

  .member-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--bg);
    margin-bottom: 8px;
  }
  .member-row:last-child { margin-bottom: 0; }
  .member-avatar { font-size: 1.3rem; }
  .member-name { flex: 1; font-size: 0.95rem; }
  .member-tag { font-size: 0.72rem; color: var(--gold); }

  .layout-row {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    align-items: flex-start;
    width: 100%;
  }

  /* Empty seat placeholder */
  .empty-seat-hint {
    position: absolute;
    inset: 10%;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    border-radius: 50%;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translate(-50%,-50%) scale(.8); } to { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
  .seat { animation: fadeIn .35s ease; }
</style>
</head>
<body>

<header>
  <span class="cheese-icon">🧀</span>
  <h1>CHEESE THIEF</h1>
</header>

<main>
  <!-- LOBBY -->
  <div id="lobby">
    <div class="card">
      <h2>Who are you?</h2>
      <div class="field">
        <label for="nameInput">Your name</label>
        <input id="nameInput" type="text" maxlength="20" placeholder="Enter your name…" autocomplete="off">
      </div>
    </div>

    <div class="card">
      <h2>Create a room</h2>
      <button class="btn btn-primary" id="createBtn">🚪 Create Room</button>
    </div>

    <div class="divider">— or —</div>

    <div class="card">
      <h2>Join a room</h2>
      <div class="field">
        <label for="codeInput">Room code</label>
        <input id="codeInput" class="code-input" type="text" maxlength="4" placeholder="XXXX" autocomplete="off">
      </div>
      <button class="btn btn-secondary" id="joinBtn">🔑 Join Room</button>
    </div>

    <div class="error-msg" id="lobbyError"></div>
  </div>

  <!-- ROOM -->
  <div id="room">
    <div class="room-header">
      <div class="room-code-box">
        <div class="label">Room Code</div>
        <div class="code" id="displayCode">----</div>
      </div>
      <div class="room-actions">
        <button class="btn btn-gold btn-sm" id="randomiseBtn" style="display:none">🎲 Randomise Seats</button>
        <button class="btn btn-danger btn-sm" id="leaveBtn">🚪 Leave Room</button>
      </div>
    </div>

    <div class="layout-row">
      <div class="table-wrap" id="tableWrap">
        <div class="table-circle"></div>
        <div class="table-label"><span>Table</span></div>
        <!-- seats injected here -->
      </div>

      <div class="members-panel">
        <h3>Players</h3>
        <div id="memberList"></div>
      </div>
    </div>
  </div>
</main>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let myId = socket.id;
let myName = '';
let isAdmin = false;
let currentCode = null;

socket.on('connect', () => { myId = socket.id; });

// ── Lobby ──
const nameInput = document.getElementById('nameInput');
const codeInput = document.getElementById('codeInput');
const lobbyError = document.getElementById('lobbyError');

codeInput.addEventListener('input', () => {
  codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z]/g, '');
});

document.getElementById('createBtn').addEventListener('click', () => {
  const name = nameInput.value.trim();
  if (!name) { lobbyError.textContent = 'Please enter your name.'; return; }
  myName = name;
  lobbyError.textContent = '';
  socket.emit('create_room', { name });
});

document.getElementById('joinBtn').addEventListener('click', () => {
  const name = nameInput.value.trim();
  const code = codeInput.value.trim().toUpperCase();
  if (!name) { lobbyError.textContent = 'Please enter your name.'; return; }
  if (code.length !== 4) { lobbyError.textContent = 'Please enter a 4-letter room code.'; return; }
  myName = name;
  lobbyError.textContent = '';
  socket.emit('join_room', { name, code });
});

document.getElementById('leaveBtn').addEventListener('click', () => {
  socket.emit('leave_room');
  showLobby();
});

document.getElementById('randomiseBtn').addEventListener('click', () => {
  socket.emit('randomise_seats');
});

socket.on('joined_room', ({ code, isAdmin: admin }) => {
  isAdmin = admin;
  currentCode = code;
  document.getElementById('displayCode').textContent = code;
  document.getElementById('randomiseBtn').style.display = admin ? 'inline-flex' : 'none';
  showRoom();
});

socket.on('kicked', () => {
  alert('You have been removed from the room by the admin.');
  showLobby();
});

socket.on('error', (msg) => {
  lobbyError.textContent = msg;
});

socket.on('room_update', ({ admin, members }) => {
  isAdmin = admin === myId;
  document.getElementById('randomiseBtn').style.display = isAdmin ? 'inline-flex' : 'none';
  renderTable(members, admin);
  renderMemberList(members, admin);
});

// ── Views ──
function showLobby() {
  currentCode = null;
  isAdmin = false;
  document.getElementById('lobby').style.display = 'flex';
  document.getElementById('room').style.display = 'none';
  nameInput.value = '';
  codeInput.value = '';
  lobbyError.textContent = '';
}

function showRoom() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('room').style.display = 'flex';
}

// ── Silhouette SVG ──
function silhouetteSVG(color) {
  return `<svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- head -->
    <circle cx="26" cy="14" r="9" fill="${color}"/>
    <!-- body -->
    <path d="M10 48 C10 34 42 34 42 48" fill="${color}"/>
    <rect x="14" y="22" width="24" height="22" rx="6" fill="${color}"/>
  </svg>`;
}

const COLORS = ['#5b8dd9','#d96b5b','#5bd9a0','#d9c45b','#a05bd9','#5bd9d9','#d95ba0','#8dd95b'];

// ── Table rendering ──
function renderTable(members, adminId) {
  const wrap = document.getElementById('tableWrap');
  // Remove old seats
  wrap.querySelectorAll('.seat').forEach(el => el.remove());

  const n = members.length;
  if (n === 0) return;

  const wrapSize = wrap.offsetWidth || 520;
  const cx = wrapSize / 2;
  const cy = wrapSize / 2;
  // radius for seat centres — slightly outside the table edge
  const tableR = wrapSize * 0.4;
  const seatR = tableR + wrapSize * 0.105;

  // Sort by seat index
  const sorted = [...members].sort((a, b) => a.seat - b.seat);

  sorted.forEach((m, i) => {
    const angle = (2 * Math.PI * i) / n - Math.PI / 2;
    const x = cx + seatR * Math.cos(angle);
    const y = cy + seatR * Math.sin(angle);

    const color = COLORS[i % COLORS.length];
    const isMe = m.id === myId;
    const isAdminMember = m.id === adminId;

    const seat = document.createElement('div');
    seat.className = 'seat';
    seat.style.left = x + 'px';
    seat.style.top = y + 'px';
    seat.dataset.id = m.id;

    seat.innerHTML = `
      <div class="silhouette">
        ${silhouetteSVG(color)}
        ${isAdminMember ? '<span class="seat-badge">⭐</span>' : ''}
      </div>
      <div class="seat-name">${esc(m.name)}${isMe ? ' (you)' : ''}</div>
    `;

    wrap.appendChild(seat);
  });
}

// ── Member list ──
function renderMemberList(members, adminId) {
  const list = document.getElementById('memberList');
  list.innerHTML = '';

  const sorted = [...members].sort((a, b) => a.seat - b.seat);

  sorted.forEach((m, i) => {
    const isAdminMember = m.id === adminId;
    const isMe = m.id === myId;
    const color = COLORS[i % COLORS.length];

    const row = document.createElement('div');
    row.className = 'member-row';
    row.innerHTML = `
      <span class="member-avatar" style="color:${color}">●</span>
      <span class="member-name">
        ${isAdminMember ? '⭐ ' : ''}${esc(m.name)}${isMe ? ' <span class="member-tag">(you)</span>' : ''}
      </span>
      ${isAdmin && !isMe && !isAdminMember
        ? `<button class="btn btn-danger btn-sm kick-btn" data-id="${m.id}">Kick</button>`
        : isAdminMember ? '<span class="member-tag">Admin</span>' : ''}
    `;
    list.appendChild(row);
  });

  list.querySelectorAll('.kick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const targetId = btn.dataset.id;
      if (confirm('Remove this player from the room?')) {
        socket.emit('kick_member', { targetId });
      }
    });
  });
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Re-render table on window resize
window.addEventListener('resize', () => {
  // Re-request room state by re-triggering last known update isn't possible,
  // but we can store it
});

// Cache last room state for resize
let lastRoomState = null;
socket.on('room_update', (data) => { lastRoomState = data; });
window.addEventListener('resize', () => {
  if (lastRoomState) {
    renderTable(lastRoomState.members, lastRoomState.admin);
  }
});
</script>
</body>
</html>
